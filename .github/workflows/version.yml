name: Version Bump & Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Create Version PR or Tag Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      has-changesets: ${{ steps.changesets.outputs.hasChangesets }}
      published: ${{ steps.changesets.outputs.published }}
      published-packages: ${{ steps.changesets.outputs.publishedPackages }}

    steps:
      # Checkout completo do repo
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      # Garantir que tags estejam disponíveis
      - name: Fetch all tags
        run: git fetch --tags --force

      # Setup PNPM
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      # Instalar dependências
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Criar PR de version ou executar version
      - name: Create Version PR or Tag
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run changeset:version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Detectar se o commit atual é o merge do PR de version
      - name: Detect version commit
        id: detect
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "Último commit:"
          echo "$COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -q "chore(release): version packages"; then
            echo "is_release_commit=true" >> $GITHUB_OUTPUT
            echo "✅ Commit de release detectado"
          else
            echo "is_release_commit=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Commit normal — aguardando merge do PR de version"
          fi

      # Extrair versão do pacote principal
      - name: Extract version
        if: steps.detect.outputs.is_release_commit == 'true'
        id: extract
        run: |
          VERSION=$(node -p "require('./packages/react-lgpd-consent/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Versão encontrada: v$VERSION"

      # Criar tag de release (somente se ainda não existir)
      - name: Create git tag
        if: steps.detect.outputs.is_release_commit == 'true'
        run: |
          VERSION="${{ steps.extract.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "⚠️ Tag v$VERSION já existe — nada a fazer"
          else
            echo "🚀 Criando tag v$VERSION"

            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"

            echo "✅ Tag criada com sucesso"
          fi
